services:
  - type: web
    name: alertas-procesos-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: ALERT_MAIL_PROVIDER
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: ALERT_SMTP_HOST
        value: smtp.gmail.com
      - key: ALERT_SMTP_PORT
        value: "587"
      - key: ALERT_SMTP_USER
        sync: false
      - key: ALERT_SMTP_PASSWORD
        sync: false
      - key: ALERT_EMAIL_FROM
        sync: false
      - key: ALERT_SMTP_USE_TLS
        value: "1"
      - key: MS_TENANT_ID
        sync: false
      - key: MS_CLIENT_ID
        sync: false
      - key: MS_CLIENT_SECRET
        sync: false
